# ─────────────────────────────────────────────────────────────────────────────
# Prometheus Configuration for Notifly
#
# INF-001 FIX:
#   notifly-api is now scraped on port 9091 (management port), not 8080.
#   Port 8080 is the public API — its /actuator/prometheus is protected by
#   Spring Security and would return 401. Port 9091 is the dedicated management
#   server with no security filter chain — Prometheus scrapes it freely.
#
#   notifly-worker was never changed — it still exposes metrics on 8081
#   with no security restrictions (worker has no SecurityConfig).
#
# Previous fixes retained:
#   - Worker scrape jobs added (were missing entirely before)
#   - Labels added for Grafana dashboard filtering
# ─────────────────────────────────────────────────────────────────────────────

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    environment: 'local'
    project:     'notifly'

rule_files:
  # - "alert_rules.yml"

scrape_configs:

  # ── Prometheus self-monitoring ──────────────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ── Notifly API ─────────────────────────────────────────────────────────────
  # INF-001 FIX: port changed 8080 → 9091 (management port, no auth required).
  # Port 9091 is internal-only — not mapped to the host in docker-compose.yml.
  - job_name: 'notifly-api'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 15s
    static_configs:
      - targets: ['notifly-api:9091']
        labels:
          service:  'api'
          instance: 'api-1'

  # ── Notifly Worker instances ──────────────────────────────────────────────
  # Worker has no SecurityConfig — port 8081 is open to Prometheus as-is.
  - job_name: 'notifly-worker'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 15s
    static_configs:
      - targets: ['notifly-worker-1:8081']
        labels:
          service:  'worker'
          instance: 'worker-1'
      - targets: ['notifly-worker-2:8081']
        labels:
          service:  'worker'
          instance: 'worker-2'

  # ── Redis (requires redis_exporter sidecar) ─────────────────────────────────
  # Uncomment if you add redis_exporter to docker-compose:
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']
  #       labels:
  #         service: 'redis'

  # ── Kafka JMX (requires jmx_exporter) ───────────────────────────────────────
  # Uncomment if you add kafka jmx_exporter to docker-compose:
  # - job_name: 'kafka'
  #   static_configs:
  #     - targets: ['kafka:9308']
  #       labels:
  #         service: 'kafka'